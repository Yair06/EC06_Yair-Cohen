name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

# ── Sécurité : permissions minimales par défaut ──
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Pilier 3a : Job Quality (Lint & Test) ──
  quality:
    name: Code Quality (Lint & Test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .env
        run: cp .env.dist .env

      - name: Run Lint in Docker
        run: docker compose run --rm app npm run lint

      - name: Run Tests in Docker
        run: docker compose run --rm app npm test

  # ── Pilier 3b : Job Build ──
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry (ghcr.io)
        # Utilise GITHUB_TOKEN (secret automatique) pour ghcr.io
        # Les secrets DOCKER_USERNAME / DOCKER_PASSWORD sont stockés dans GitHub Secrets
        # et seraient utilisés pour Docker Hub si besoin
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Bonus : Scan de sécurité de l'image Docker (Trivy) ──
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for scan
        run: docker build -t skillhub-api:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'skillhub-api:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ── Pilier 3c : Job Deploy (Simulé) ──
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    # Déclenché uniquement sur la branche main
    if: github.ref == 'refs/heads/main'
    # Bonus : GitHub Environment pour la production
    environment:
      name: production
      url: https://skillhub-api.example.com
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Run deploy script
        run: |
          chmod +x deploy.sh
          ./deploy.sh ${{ steps.vars.outputs.sha_short }}

      - name: Upload deployment logs
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: deploy.log
